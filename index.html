<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Интерактивная схема: медицинские документы и ЕГИСЗ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px}
h1{font-size:1rem;font-weight:600;color:#94a3b8;margin-bottom:18px;letter-spacing:.05em;text-transform:uppercase}

.scenarios{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;max-width:1480px}
.sc-btn{padding:8px 16px;border-radius:8px;border:1.5px solid transparent;background:#1e293b;color:#94a3b8;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s}
.sc-btn:hover{border-color:#475569;color:#e2e8f0}
.sc-btn.active{color:#fff;border-color:transparent;font-weight:600}
.sc-btn[data-id=success].active{background:#166534;border-color:#16a34a}
.sc-btn[data-id=fail].active{background:#991b1b;border-color:#dc2626}
.sc-btn[data-id=dupe].active{background:#1e3a8a;border-color:#3b82f6}
.sc-btn[data-id=retry].active{background:#78350f;border-color:#f59e0b}
.sc-btn[data-id=network].active{background:#7f1d1d;border-color:#ef4444}
.sc-btn[data-id=badreq].active{background:#4c1d95;border-color:#8b5cf6}
.sc-btn[data-id=client4xx].active{background:#9a3412;border-color:#f97316}
.sc-btn[data-id=freeze].active{background:#1e293b;border-color:#64748b}

.diagram-wrap{background:#fff;border-radius:14px;padding:28px 24px;width:100%;max-width:1480px;overflow-x:auto}
.diagram-wrap svg{min-width:1420px;height:auto}

.el{transition:opacity .35s,filter .35s}
.el.dim{opacity:.1}
.el.visited{opacity:.4}
.el.active{opacity:1}
.el.hidden{display:none}
.el.active .node-rect{filter:drop-shadow(0 0 8px var(--glow,rgba(99,102,241,.9)))}
.el.active .arrow-line,.el.active .arrow-path{stroke-width:3;filter:drop-shadow(0 0 4px var(--glow,rgba(99,102,241,.8)))}
.arrow-draw{stroke-dashoffset:var(--len);animation:drawIt .55s ease-out forwards}
@keyframes drawIt{to{stroke-dashoffset:0}}
@keyframes nodePop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.el.active .node-g{animation:nodePop .4s ease-out}
.diagram-wrap svg .flow-note{paint-order:stroke;stroke:rgba(255,255,255,.96);stroke-width:3px;stroke-linejoin:round}

.step-panel{margin-top:16px;width:100%;max-width:1480px;background:#1e293b;border-radius:12px;padding:16px 20px}
.step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.step-counter{font-size:.78rem;color:#64748b;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.step-controls{display:flex;gap:8px}
.ctrl-btn{background:#334155;border:none;color:#94a3b8;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:#475569;color:#fff}
.ctrl-btn.playing{background:#1d4ed8;color:#fff}
.step-text{font-size:.95rem;color:#e2e8f0;min-height:2.2rem;line-height:1.5}
.step-dots{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#334155;transition:background .3s,transform .3s}
.dot.done{background:#475569}
.dot.current{background:#60a5fa;transform:scale(1.4)}
.hint{text-align:center;color:#475569;font-size:.82rem;margin-top:8px}
.diagram-wrap{position:relative}
.pick-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;background:rgba(255,255,255,.72);border-radius:14px;pointer-events:none;transition:opacity .3s}
.pick-overlay.hidden{opacity:0}
.pick-overlay-icon{font-size:2.2rem}
.pick-overlay-text{font-size:1.1rem;font-weight:700;color:#334155;letter-spacing:.01em}
.pick-overlay-sub{font-size:.82rem;color:#64748b}
</style>
</head>

<div class="scenarios">

// ─── state ────────────────────────────────────────────────────────────────────
let currentScenario = null, currentStep = 0, timer = null, relevant = new Set();

function q(id){ return document.querySelector(`[data-id="${id}"]`); }

function setRelevant(sc) {
  relevant = new Set();
  sc.steps.forEach(s => s.el.forEach(id => relevant.add(id)));
  if(['n-redis-lock','n-redis-nsi','n-redis-rate'].some(id => relevant.has(id)))
    relevant.add('n-redis-section');
  if(['n-pix','n-emk','n-eventlog','n-egisz'].some(id => relevant.has(id)))
    relevant.add('n-n3h-box');
}

function dimAll() {
  ALL_EL.forEach(id => {
    const el = q(id); if(!el) return;
    if(relevant.has(id)){
      el.classList.remove('active','visited','hidden'); el.classList.add('dim');
    } else {
      el.classList.remove('active','visited','dim'); el.classList.add('hidden');
    }
  });
}

function resetAll() {
  ALL_EL.forEach(id => {
    const el = q(id); if(!el) return;
    el.classList.remove('active','visited','dim','hidden');
  });
}

function activate(ids) {
  ids.forEach(id => {
    const el = q(id); if(!el) return;
    el.classList.remove('dim','visited','hidden'); el.classList.add('active');
    el.querySelectorAll('path.arrow-path,line.arrow-line').forEach(p => {
      const len = p.getTotalLength ? p.getTotalLength() : 120;
      p.style.strokeDasharray = len;
      p.style.setProperty('--len', len+'px');
      p.classList.remove('arrow-draw'); void p.offsetWidth; p.classList.add('arrow-draw');
    });
  });
}

function visit(ids) {
  ids.forEach(id => {
    const el = q(id); if(!el || el.classList.contains('active')) return;
    el.classList.remove('dim','active','hidden'); el.classList.add('visited');
  });
}

function renderStep(i) {
  const sc = SCENARIOS[currentScenario];
  dimAll();
  for(let k=0; k<i; k++) visit(sc.steps[k].el);
  activate(sc.steps[i].el);
  document.getElementById('step-counter').textContent = `${sc.label} — Шаг ${i+1} из ${sc.steps.length}`;
  document.getElementById('step-text').textContent = sc.steps[i].text;
  const dotsEl = document.getElementById('step-dots');
  dotsEl.innerHTML = '';
  sc.steps.forEach((_,k) => {
    const d = document.createElement('div');
    d.className = 'dot'+(k<i?' done':k===i?' current':'');
    dotsEl.appendChild(d);
  });
}

function selectScenario(id) {
  stopPlay();
  currentScenario = id;
  document.getElementById('pick-overlay').classList.add('hidden');
  currentStep = 0;
  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sc-btn[data-id="${id}"]`).classList.add('active');
  setRelevant(SCENARIOS[id]);
  renderStep(0);
}

function nextStep() {
  if(!currentScenario) return;
  if(currentStep < SCENARIOS[currentScenario].steps.length - 1){
    currentStep++; renderStep(currentStep);
  } else stopPlay();
}

function prevStep() {
  if(!currentScenario) return;
  stopPlay();
  if(currentStep > 0){ currentStep--; renderStep(currentStep); }
}

function stopPlay() {
  clearInterval(timer); timer = null;
  const b = document.getElementById('btn-play');
  if(b){ b.classList.remove('playing'); b.textContent = '▶ Авто'; }
}

function startPlay() {
  const b = document.getElementById('btn-play');
  b.classList.add('playing'); b.textContent = '⏸ Пауза';
  timer = setInterval(() => {
    if(currentStep < SCENARIOS[currentScenario].steps.length - 1){
      currentStep++; renderStep(currentStep);
    } else stopPlay();
  }, 2200);
}

function togglePlay() {
  if(timer) stopPlay(); else if(currentScenario) startPlay();
}

document.querySelectorAll('.sc-btn').forEach(b =>
  b.addEventListener('click', () => selectScenario(b.dataset.id))
);

document.addEventListener('keydown', e => {
  if(e.key==='ArrowRight') nextStep();
  if(e.key==='ArrowLeft')  prevStep();
  if(e.key===' '){ e.preventDefault(); togglePlay(); }
});
</script>
