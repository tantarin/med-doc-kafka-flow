<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">

<title>Интерактивная схема: медицинские документы и ЕГИСЗ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px}
h1{font-size:1rem;font-weight:600;color:#94a3b8;margin-bottom:18px;letter-spacing:.05em;text-transform:uppercase}

/* ── scenario buttons ── */
.scenarios{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:20px;max-width:1400px}
.sc-btn{padding:8px 16px;border-radius:8px;border:1.5px solid transparent;background:#1e293b;color:#94a3b8;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .2s}
.sc-btn:hover{border-color:#475569;color:#e2e8f0}
.sc-btn.active{color:#fff;border-color:transparent;font-weight:600}
.sc-btn[data-id=success].active{background:#166534;border-color:#16a34a}
.sc-btn[data-id=fail].active{background:#991b1b;border-color:#dc2626}
.sc-btn[data-id=dupe].active{background:#1e3a8a;border-color:#3b82f6}
.sc-btn[data-id=retry].active{background:#78350f;border-color:#f59e0b}
.sc-btn[data-id=network].active{background:#7f1d1d;border-color:#ef4444}
.sc-btn[data-id=badreq].active{background:#4c1d95;border-color:#8b5cf6}

/* ── diagram wrapper ── */
.diagram-wrap{background:#ffffff;border-radius:14px;padding:28px 24px 20px;width:100%;max-width:1400px;overflow-x:auto}

/* ── SVG element states ── */
.el{transition:opacity .35s,filter .35s}
.el.dim{opacity:.1}
.el.visited{opacity:.4}
.el.active{opacity:1}
.el.active .node-rect{filter:drop-shadow(0 0 8px var(--glow,rgba(99,102,241,.9)))}
.el.active .arrow-line,.el.active .arrow-path{stroke-width:3;filter:drop-shadow(0 0 4px var(--glow,rgba(99,102,241,.8)))}

/* arrow draw animation */
.arrow-draw{stroke-dashoffset:var(--len);animation:drawIt .55s ease-out forwards}
@keyframes drawIt{to{stroke-dashoffset:0}}

/* node pulse */
@keyframes nodePop{0%{transform:scale(1)}50%{transform:scale(1.04)}100%{transform:scale(1)}}
.el.active .node-g{animation:nodePop .4s ease-out}

/* ── step panel ── */
.step-panel{margin-top:16px;width:100%;max-width:1400px;background:#1e293b;border-radius:12px;padding:16px 20px}
.step-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.step-counter{font-size:.78rem;color:#64748b;font-weight:600;letter-spacing:.05em;text-transform:uppercase}
.step-controls{display:flex;gap:8px}
.ctrl-btn{background:#334155;border:none;color:#94a3b8;border-radius:6px;padding:6px 14px;font-size:.82rem;cursor:pointer;transition:all .15s}
.ctrl-btn:hover{background:#475569;color:#fff}
.ctrl-btn.playing{background:#1d4ed8;color:#fff}
.step-text{font-size:.95rem;color:#e2e8f0;min-height:2.2rem;line-height:1.5}
.step-label{display:inline-block;margin-bottom:6px;font-size:.72rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;padding:2px 8px;border-radius:4px}
.step-dots{display:flex;gap:5px;margin-top:12px;flex-wrap:wrap}
.dot{width:8px;height:8px;border-radius:50%;background:#334155;transition:background .3s,transform .3s}
.dot.done{background:#475569}
.dot.current{background:#60a5fa;transform:scale(1.4)}

/* hint */
.hint{text-align:center;color:#475569;font-size:.82rem;margin-top:8px}
</style>
</head>

let currentScenario = null;
let currentStep = -1;
let visitedSteps = [];
let playInterval = null;

// ─── Helpers ───────────────────────────────────────────────────────────────
function getEl(id){ return document.getElementById(id); }

function setAllDim(){
  ALL_EL.forEach(id => {
    const el = getEl(id);
    if(el){ el.classList.remove('active','visited'); el.classList.add('dim'); }
  });
}

function setAllNormal(){
  ALL_EL.forEach(id => {
    const el = getEl(id);
    if(el){ el.classList.remove('active','visited','dim'); }
  });
}

function activateElements(ids){
  ids.forEach(id => {
    const el = getEl(id);
    if(!el) return;
    el.classList.remove('dim','visited');
    el.classList.add('active');
    // animate arrows
    el.querySelectorAll('path.arrow-path, line.arrow-line').forEach(path => {
      const len = path.getTotalLength ? path.getTotalLength() : 120;
      path.style.strokeDasharray = len;
      path.style.setProperty('--len', len + 'px');
      path.classList.remove('arrow-draw');
      void path.offsetWidth; // reflow
      path.classList.add('arrow-draw');
    });
  });
}

function markVisited(ids){
  ids.forEach(id => {
    const el = getEl(id);
    if(!el) return;
    if(!el.classList.contains('active')){
      el.classList.remove('dim','active');
      el.classList.add('visited');
    }
  });
}

function renderStep(scenario, stepIdx){
  const sc = SCENARIOS[scenario];
  const step = sc.steps[stepIdx];

  setAllDim();

  // mark all previous steps as visited
  for(let i = 0; i < stepIdx; i++){
    markVisited(sc.steps[i].el);
  }

  activateElements(step.el);

  // update UI
  getEl('step-counter').textContent = `${sc.label} — Шаг ${stepIdx+1} из ${sc.steps.length}`;
  getEl('step-text').textContent = step.text;

  // dots
  const dotsEl = getEl('step-dots');
  dotsEl.innerHTML = '';
  sc.steps.forEach((_,i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i < stepIdx ? ' done' : '') + (i === stepIdx ? ' current' : '');
    dotsEl.appendChild(d);
  });
}

  stopPlay();
  currentScenario = id;
  currentStep = 0;

  document.querySelectorAll('.sc-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`.sc-btn[data-id="${id}"]`).classList.add('active');

  renderStep(id, 0);
  startPlay();
}

function nextStep(){
  if(!currentScenario) return;
  const sc = SCENARIOS[currentScenario];
  if(currentStep < sc.steps.length - 1){
    currentStep++;
    renderStep(currentScenario, currentStep);
  } else {
    stopPlay();
    getEl('btn-play').classList.remove('playing');
    getEl('btn-play').textContent = '▶ Авто';
  }
}

function prevStep(){
  if(!currentScenario) return;
  stopPlay();
  if(currentStep > 0){
    currentStep--;
    renderStep(currentScenario, currentStep);
  }
}

function startPlay(){
  getEl('btn-play').classList.add('playing');
  getEl('btn-play').textContent = '⏸ Пауза';
  playInterval = setInterval(() => {
    const sc = SCENARIOS[currentScenario];
    if(currentStep < sc.steps.length - 1){
      currentStep++;
      renderStep(currentScenario, currentStep);
    } else {
      stopPlay();
    }
  }, 2200);
}

function stopPlay(){
  clearInterval(playInterval);
  playInterval = null;
  if(getEl('btn-play')){ getEl('btn-play').classList.remove('playing'); getEl('btn-play').textContent = '▶ Авто'; }
}

function togglePlay(){
  if(playInterval){ stopPlay(); } else { if(currentScenario) startPlay(); }
}

// wire scenario buttons
document.querySelectorAll('.sc-btn').forEach(btn => {
  btn.addEventListener('click', () => selectScenario(btn.dataset.id));
});

// keyboard nav
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowRight') nextStep();
  if(e.key === 'ArrowLeft')  prevStep();
  if(e.key === ' '){ e.preventDefault(); togglePlay(); }
});
</script>
</body>
</html>
